# Exodus Browser — nightly full verify (Rust + integration). PRs use ci.yml frontend-auto only.
name: Verify Nightly

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: verify-nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Nightly verify
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri exodus-core

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Frontend auto gate
        run: pnpm check && pnpm test:auto:e2e
        env:
          CI: '1'

      - name: Run full verify suite
        run: sh scripts/verify.sh

      - name: Frontend coverage report
        run: pnpm test:coverage
