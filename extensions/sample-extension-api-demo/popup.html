<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extension API Demo</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    
    h1 {
      font-size: 18px;
      margin: 0 0 16px 0;
      color: #333;
    }
    
    .section {
      margin-bottom: 16px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
    }
    
    .section h2 {
      font-size: 14px;
      margin: 0 0 8px 0;
      color: #666;
    }
    
    button {
      width: 100%;
      padding: 8px 12px;
      margin: 4px 0;
      border: none;
      border-radius: 4px;
      background: #007bff;
      color: white;
      cursor: pointer;
      font-size: 13px;
    }
    
    button:hover {
      background: #0056b3;
    }
    
    button.secondary {
      background: #6c757d;
    }
    
    button.secondary:hover {
      background: #545b62;
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    
    .stat {
      background: white;
      padding: 8px;
      border-radius: 4px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: #333;
    }
    
    .stat-label {
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Extension API Demo</h1>
  
  <div class="section">
    <h2>Context Menus</h2>
    <button id="createMenu">Create Menu Item</button>
    <button id="getMenus" class="secondary">Get Menu Items</button>
  </div>
  
  <div class="section">
    <h2>Side Panel</h2>
    <button id="openPanel">Open Panel</button>
    <button id="closePanel" class="secondary">Close Panel</button>
  </div>
  
  <div class="section">
    <h2>Top Sites</h2>
    <button id="getTopSites">Get Top Sites</button>
  </div>
  
  <div class="section">
    <h2>Usage Statistics</h2>
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="menuClicks">0</div>
        <div class="stat-label">Menu Clicks</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="navigations">0</div>
        <div class="stat-label">Navigations</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="omniboxUses">0</div>
        <div class="stat-label">Omnibox Uses</div>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
